version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dfo_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dfo_core
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dfo_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dfo_backend_app
    restart: always
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/dfo_core?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=dfo-core-backend-super-secret-key-change-me
      - JWT_EXPIRATION=24h
      - NODE_ENV=production
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
